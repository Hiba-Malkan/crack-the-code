<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crack the Code</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Crack the Code</h1>
    <p class="sub">Guess the 4-digit code</p>
    <div id="guess">
        Guess: ----
    </div>
    <div class="reel">
        <span id="digit">0</span>
    </div>
    <div id="status">
        Press <kbd>SPACE</kbd> to select digits. The first 4 selected digits are checked against the secret code.
    </div>
</body>
</html>
